<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Etese</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --col1: #F6AE2D;
            --col2: #1D110A;
            --col3: #FCFFF7;
            --col4: #296EB4;
            --col5: #1789FC;

            --gray1: #e4e7eb;
            --gray2: #cbced1;
            --gray3: #828688;
            --gray4: #48494b;
            --gray5: #242425;

            --naviheight: 150px;
            

            --grad-blue: linear-gradient(var(--col5), var(--col4));
            --grad-gray: linear-gradient(var(--gray1), var(--gray2));

                
        }
        body {
            font-family: arial;
            font-size: 2em;
        }
        a {
            font-size: 2rem;
            
        }
        .adnot {
            font-style: italic;
            font-size: 1.5rem; 
            opacity: 0.7;
            
        }
        .button {
            display: flex;
            border-radius: 10px;
            padding: 10px;
            background-image: linear-gradient(var(--col5), var(--col4));
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        input {
            font-size: 2rem;
            border-radius: 10px;
            padding: 10px;
        }
        input::placeholder {
          font-size: 2rem;
          /*opacity: 1;  Ensures consistent color across browsers */
        }
        
         /* The Container */
         .scroll-container {
             display: flex;
             overflow-x: auto;
             scroll-snap-type: x mandatory; /* Forces snapping on the X axis */
             scroll-behavior: smooth;
             width: 100vw;
             height: auto;
         }

         /* The Pages */
         .page {
             flex: 0 0 100%; /* Each page takes up 100% of the width */
             height: 100%;
             scroll-snap-align: start; /* Where the page should "stick" */
             display: flex;
             /*flex-direction: column;*/
             justify-content: space-between;
         }
        /* The container that handles the animation */
        .reveal-wrapper {
          display: grid;
          grid-template-rows: 0fr; /* Effectively hidden */
          transition: grid-template-rows 0.5s ease-out;
          overflow: hidden;
          background: #f4f4f4;
          border-radius: 8px;
            margin-top: 10px;
        }
        
        /* This inner div is necessary for the browser to calculate height correctly */
        .reveal-content {
          min-height: 0; 
          padding: 0 20px; /* Horizontal padding is fine */
        }
        
        /* The "Open" State */
        .reveal-wrapper.is-open {
          grid-template-rows: 1fr; /* Expands to fit content */
          
        }
        .checkbox {
          font-size: 2em;
          display: flex;
          align-items: center;
          gap: 10px;
        }
        .definition {
            position: fixed;
            bottom: 0; /* Let's assume it starts at the bottom */
            left: 0;
            right: 0;
            height: auto;
            min-height: 40vh;
            background: white;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            touch-action: none; /* Prevents the whole page from scrolling while swiping this */
            will-change: transform;
            /* We only want transitions when the user LEAVES the element */
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px 45px 15px 15px;
        }
        
        .definition.is-dragging {
          transition: none; /* Kill the transition so it follows the finger instantly */
        }
        
        .definition.hidden {
          transform: translateY(100%);
        }
        .word-tags {
            display: flex;
            border-radius: 15px;
            padding: 10px;
            margin: 5px;
            background-color: var(--col4);
            color: white;
        }
        .navi {
            display: flex;
            background-color: var(--gray5);
            height: var(--naviheight);
            position: fixed;
            top: 0;
            left: 0;
            width: 105vw;
            align-items: center;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="navi">
        <img src="images/artilang.png" style="height: 80%">
        <div onclick="document.getElementById(&quot;options&quot;).style.display = &quot;flex&quot;" style="display: flex; justify-content: flex-end; flex-direction: column; justify-content: space-between; height: 40%; margin-right: 80px;">      
            <div style="width: 80px; height: 6px; background-color: white; border-radius: 3px;"></div>
            <div style="width: 80px; height: 6px; background-color: white; border-radius: 3px;"></div><div style="width: 80px; height: 6px; background-color: white; border-radius: 5px;"></div>
        </div>
    </div>
    <div style="height: 175px; width: 1px;"></div>

    <div class="definition hidden" id="definition">
        <a id="definition-header"></a>
        <a id="definition-tags"></a>
        <div id="definition-desc"></div>
    </div>

    <div style="display: flex; height: 80px; margin-bottom: 10px;">
        <input id="input-query" placeholder="Enter query here" style="width: 60%; margin-right: 5px;">
        <div class="button" onclick="displayPage()" style="width: 35%;">
            <a style="color: var(--col3)"> Search </a>
        </div>
    </div>
    <div onclick="showAdvanced()" >
        <a id="filters-text" class="button" style="background: var(--grad-gray)">Show filters</a>
    </div>

    <div class="reveal-wrapper" id="revealWrapper">
      <div class="reveal-content">
          <h3 style="margin-top: 10px; margin-bottom: 10px;">Tags and categories</h3>
          <a>You can search by tags and categories eg. "red @adj #colors"</a><br>
          
          <h3 style="margin-top: 10px; margin-bottom: 10px;">Search by following languages</h3>
          <label class="checkbox">
              <input type="checkbox" style="transform: scale(2);" id="cbox-input-lang">
              <a>Input language</a>
          </label>
          <label class="checkbox">
              <input type="checkbox" style="transform: scale(2);" id="cbox-output-lang">
              <a>Output language</a>
          </label>
          <label class="checkbox">
              <input type="checkbox" style="transform: scale(2);" id="cbox-other-lang">
              <a>Other translations</a>
          </label>
          
      </div>
    </div>

    <a id="page-counter"></a>
    <a id="results-counter"></a>
    <div id="dictionary-container" style="margin-top: 15px;">Loading words...</div>

    <script>
        
        let words = []; // initialising as global array
        let currentPage = 1;
        const columns = 3;
        const WPC = 10;
        const WPP = WPC*columns;

        let dbSettings;

        const cboxInputLang = document.getElementById("cbox-input-lang");
        const cboxOutputLang = document.getElementById("cbox-output-lang");
        const cboxOtherLang = document.getElementById("cbox-other-lang");
        cboxInputLang.checked = true;
        cboxOutputLang.checked = true;
        cboxOtherLang.checked = true;

        //=============================================================
       

        async function goToPage(pageIndex) {
            const scrollContainer = document.querySelector('.scroll-container');
            const pageWidth = scrollContainer.offsetWidth;
          
            scrollContainer.scrollTo({
                left: pageIndex * pageWidth,
                behavior: 'smooth'
            });
        }
        //==============================================================
        // 1. Select all your pages and the container
        async function pageCounter() {
            const pages = document.querySelectorAll('.page');
            const observerOptions = {
              root: document.querySelector('.scroll-container'), // The scrollable parent
              threshold: 0.6 // Trigger when 60% of the page is visible
            };
            
            // 2. Define what happens when a page "snaps" into view
            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  // Get the index or ID of the visible page
                  const pageId = entry.target.id;
                  const pageIndex = Array.from(pages).indexOf(entry.target) + 1;
                  
                  console.log(`Current Page: ${pageIndex}`);
                    currentPage = pageIndex;
                  updateUI(pageIndex); // Call a function to update your navigation
                }
              });
            }, observerOptions);
            
            // 3. Start watching each page
            pages.forEach(page => observer.observe(page));
            
            function updateUI(index) {
              // Example: Update a page counter text
              document.getElementById('page-counter').textContent = `Page ${index} of ${pages.length}`;
            }
        }
        

        //===============================================================================

        const el = document.querySelector('.definition');
        let startY = 0;
        let currentDeltaY = 0;
        
        el.addEventListener('touchstart', (e) => {
          startY = e.touches[0].clientY;
          el.classList.add('is-dragging'); // Remove transitions for instant feedback
        }, {passive: true});
        
        el.addEventListener('touchmove', (e) => {
          const currentY = e.touches[0].clientY;
          currentDeltaY = currentY - startY;
        
          // Only allow swiping DOWN (positive delta)
          if (currentDeltaY > 0) {
            el.style.transform = `translateY(${currentDeltaY}px)`;
          }
        }, {passive: true});

        el.addEventListener('touchend', () => {
          el.classList.remove('is-dragging'); // Put transitions back for the "snap"
          el.style.transform = ''; // Clear the inline style so CSS classes take over
        
          // Decision Logic: If swiped more than 100px, hide it. Otherwise, snap back.
          if (currentDeltaY > 100) {
            el.classList.add('hidden');
          } else {
            el.classList.remove('hidden');
          }
          
          currentDeltaY = 0; // Reset for next time
        });

        //=====================================================================
        
        const wrapper = document.getElementById('revealWrapper');
        
        function showAdvanced() {
          wrapper.classList.toggle('is-open');
          
          // Optional: Change button text
          const isOpen = wrapper.classList.contains('is-open');
          document.getElementById("filters-text").textContent = isOpen ? 'Hide filters' : 'Show filters';
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const sheetId = urlParams.get('id');

        const defaultId = '2PACX-1vTfKG2OdSxQPoM5KZksk4JTlie4kaMiEvBDE7Tm8BvZsSk88mSQx748HK3W8-zvKXu3bJbFjST8_Lho';
        const finalId = sheetId || defaultId;
        
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${finalId}/pub?gid=0&single=true&output=csv`;
        const secondSheetGID = "298988717";
        const SECOND_SHEET_URL = SHEET_URL.replace("?gid=0", `?gid=${secondSheetGID}`);

        async function loadSettings() {
            try {
                const response = await fetch(SECOND_SHEET_URL);
                const csvData = await response.text();

                Papa.parse(csvData, {
                    header: true,
                    complete: function(results) {
                        dbSettings = results.data;
                    }
                });
            } catch (e) {
                console.error("Couldn't load the settings.", e);
            }
        }
        
        async function loadDictionary() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();

                // PapaParse converts CSV text into a JSON-like array of objects
                Papa.parse(csvData, {
                    header: true, // Uses the first row as keys (e.g., "Word", "Definition")
                    complete: function(results) {
                        
                        words = results.data.sort((a, b) => {
                            return a.Word.replaceAll("[", "").localeCompare(b.Word.replaceAll("[", ""), undefined, { sensitivity: 'base' });
                        });
                        
                        displayPage();
                        
                        const input = document.getElementById("input-query");

                        // Add event listener for keydown
                        input.addEventListener("keydown", function(event) {
                            if (event.key === "Enter") {
                                displayPage();
                            }
                        });
                    }
                });
            } catch (error) {
                console.error("Error loading the sheet:", error);
            }
        }

        function displayPage() {
            const container = document.getElementById('dictionary-container');
            container.innerHTML = ''; // Clear the "Loading" text
            container.classList.add("scroll-container");

            searchResults = applyFilters(words);
            document.getElementById("results-counter").textContent = `(${searchResults.length} entries found)`;
            
            
            totalPages = Math.ceil(searchResults.length/WPP);


            loadingPage = 1;
            
            for(loadingPage = 1; loadingPage <= totalPages; loadingPage++) {
                const section = document.createElement('section');
                section.classList.add('page');

                
                const pBegin = (loadingPage - 1)*WPP;
                const pEnd = pBegin + WPC;

                for (loadingColumn = 1; loadingColumn <= columns; loadingColumn++) {
                    const column = document.createElement('div');
                    column.style.cssText = "display: flex; flex-direction: column; width: 30%;";
                    addToIdx = (loadingColumn-1)*WPC;

                    
                    searchResults.slice(pBegin+addToIdx, pEnd+addToIdx).forEach((entry) => {
                        
                        if (entry.Word) {
                            const div = document.createElement('div');
                            POSHTML = (`[(${entry.Category}.)]`).adnotate();
                            
                            pageHTML = `
                            <a>${entry.Word.adnotate()} ${POSHTML}</a> 
                            <a style="color: var(--col4)">${entry.Translation.adnotate()}</a>
                            `;
                            
                            div.innerHTML = pageHTML;
                            div.addEventListener('click', () => loadDef(entry));
                            div.style.cssText = "display: flex; flex-direction: column; margin-bottom: 8px;";
                            column.appendChild(div);
                        }
                    });
                    section.appendChild(column);
                }
                
                container.appendChild(section);
            }
            //console.log(words);
            pageCounter();
        }
        loadDictionary();

        function applyFilters() {
            // BASIC FILTERS (query text)
            const query = document.getElementById("input-query").value;
            queryArr = [];
            query.split(/(?=[#@])/).forEach((element) => queryArr = queryArr.concat(element.trim()));
            let tags = [];
            let POS = [];
            let queryText = "";
            
            queryArr.forEach((part) => {
                if (part.includes("@")) POS = POS.concat(part.slice(1));
                else if (part.includes("#")) tags = tags.concat(part.slice(1));
                else queryText = part;
            });
            
            
            let results = words.filter((word) => {

                
                let matchingInput = false; let matchingOutput = false; let matchingOther = false;
                if (cboxInputLang.checked) {
                    if (word.Word.replaceAll("[", "").replaceAll("]", "").toLowerCase().includes(queryText.toLowerCase())) matchingInput = true;
                }
                if (cboxOutputLang.checked) {
                    if (word.Translation.replaceAll("[", "").replaceAll("]", "").toLowerCase().includes(queryText.toLowerCase())) matchingOutput = true;
                }
                if (cboxOtherLang.checked) {
                    if (word.OtherTranslations.replace(/\[.*?\]/g, "").toLowerCase().includes(queryText.toLowerCase())) matchingOther = true;
                }
                
                const matchingText = matchingInput || matchingOutput || matchingOther;
                //const matchingText = (word.Word.replaceAll("[", "").replaceAll("]", "").includes(queryText) || word.Translation.replaceAll("[", "").replaceAll("]", "").includes(queryText)); // BASIC SEARCH
               
                const tagsFound = tags.length == 0 || tags.some(t => word.Tags.includes(t));
                const POScheck = POS.length == 0 || POS.some(t => word.Category.includes(t));
                
                return matchingText && tagsFound && POScheck;
            });
            
            return results;
        }

        function loadDef(passedEntry) {
            const definition = document.getElementById("definition");
            const defHeader = document.getElementById("definition-header");
            const defDesc = document.getElementById("definition-desc");

            let tagsHTML = "";
            passedEntry.Tags.split(",").forEach((tag) => {
                 tagsHTML += `
                     <div class="word-tags">
                         <a>#${tag.trim()}</a>
                     </div>
                 ` ;
            });
            tagsHTML = `<div style="display: flex;">${tagsHTML}</div>`;
            if (passedEntry.Tags.length == 0) {
                tagsHTML = "";
            }

            let otherTranslationsHTML = "";
            if (passedEntry.OtherTranslations.length != 0) {
                otherTranslationsHTML = (`[*Other translations:] ${passedEntry.OtherTranslations}`).stylise();
            }
            
            
            let defHTML = `
            <a style="font-size: 2.6rem;">${passedEntry.Word.adnotate()} <span class = "adnot" style="font-size: 2rem;">(${passedEntry.Category}.)</span></a> <a style="font-size: 2.6rem; color: var(--col4)">${passedEntry.Translation.adnotate()}</a>
            <div style="width: 100%; margin: 15px; height: 5px; background-color: var(--gray1)"></div>
            ${tagsHTML}
            <div>${passedEntry.AdditionalInfo.stylise("")}</div>
            ${otherTranslationsHTML}
            `;


            definition.classList.remove("hidden");
            definition.innerHTML = defHTML;
            //defHeader.textContent = passedEntry.Word;
            //defDesc.innerHTML = passedEntry.AdditionalInfo.stylise("");
        }

        

        String.prototype.adnotate = function() {
            return this.replaceAll("[", "<span class = 'adnot'>").replaceAll("]", "</span>");
        }

        String.prototype.stylise = function(styling) {
            /*  [adnot]
                (*bold)
                (/italic)
                (_underlined)
                (+large text)
                && - new line
                DEF:  - definition
                EX: - example
                EXT: - example with tab
            */

            const inputArr = this.trim().split(/\s+(?=\b[A-Z]+:)/);
            let filteredArr = [];
            inputArr.forEach((element) => {
                if (element.includes("DEF:")){
                    filteredArr.push(`${element.replaceAll("DEF:", "").trim()}&&`);
                } else if (element.includes("EXT:")){
                    filteredArr.push(` >> [/${element.replaceAll("EXT:", "").trim()}] &&`);
                } else if (element.includes("EX:")){
                    filteredArr.push(` [/${element.replaceAll("EXT:", "").trim()}] &&`);
                } else {
                    filteredArr.push(element);
                }
                    
            }
                            );
            const templates = filteredArr.join("");
            console.log(templates);
            console.log(filteredArr);
            console.log(inputArr);

            
//            1. Used to express an opinion && >> [/Atiu, vele avrau toav! - I think this is really great!] && 2. Think about something && >> [/Auas ati? - What are you thinking about?]

            const endings = templates.replaceAll("]", "</span>");
            const bold = endings.replaceAll("[*", "<span style='font-weight: bold;'>");
            const italic = bold.replaceAll("[/", "<span style='font-style: italic;'>");
            const underlined = italic.replaceAll("[_", "<span style='text-decoration: underline;'>");
            const large = underlined.replaceAll("[+", "<span style='font-size: 2.5rem;'>");
            const newLine = large.replaceAll("&&", `</a><br><a ${styling}>`);
            const tabbed = newLine.replaceAll(">>", "&emsp;&emsp;");
            const final = `<a ${styling}> ${tabbed} </a>`;
            return final.adnotate();
        }
    </script>
</body>
</html>
