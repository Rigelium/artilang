<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Etese</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --col1: #F6AE2D;
            --col2: #1D110A;
            --col3: #FCFFF7;
            --col4: #296EB4;
            --col5: #1789FC;
        }
        body {
            font-family: arial;
        }
        a {
            font-size: 2rem;
            
        }
        .adnot {
            font-style: italic;
        }
        .button {
            border-radius: 2px;
            padding: 2px;
            background-image: linear-gradient(var(--col4), var(--col5));
            
        }
        
         /* The Container */
         .scroll-container {
             display: flex;
             overflow-x: auto;
             scroll-snap-type: x mandatory; /* Forces snapping on the X axis */
             scroll-behavior: smooth;
             width: 100vw;
             height: auto;
         }

         /* The Pages */
         .page {
             flex: 0 0 100%; /* Each page takes up 100% of the width */
             height: 100%;
             scroll-snap-align: start; /* Where the page should "stick" */
             display: flex;
             /*flex-direction: column;*/
             justify-content: space-between;
         }
        
    </style>
</head>
<body>

    <h1>Dictionary</h1>
    <input id="input-query" placeholder="Enter query here">
    <div class="button">
        Search
    </div>
    <div id="dictionary-container">Loading words...</div>

    <script>
        
        let words = []; // initialising as global array
        let currentPage = 1;
        const columns = 3;
        const WPC = 10;
        const WPP = WPC*columns;

        // --------------------------------------------------
        const urlParams = new URLSearchParams(window.location.search);
        const sheetId = urlParams.get('id');

        const defaultId = '2PACX-1vTfKG2OdSxQPoM5KZksk4JTlie4kaMiEvBDE7Tm8BvZsSk88mSQx748HK3W8-zvKXu3bJbFjST8_Lho';
        const finalId = sheetId || defaultId;
        
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${finalId}/pub?gid=0&single=true&output=csv`;

        
        async function loadDictionary() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();

                // PapaParse converts CSV text into a JSON-like array of objects
                Papa.parse(csvData, {
                    header: true, // Uses the first row as keys (e.g., "Word", "Definition")
                    complete: function(results) {
                        words = results.data.sort((a, b) => {
                            return a.Word.localeCompare(b.Word, undefined, { sensitivity: 'base' });
                        });
                        
                        displayPage();
                    }
                });
            } catch (error) {
                console.error("Error loading the sheet:", error);
            }
        }

        function displayPage() {
            const container = document.getElementById('dictionary-container');
            container.innerHTML = ''; // Clear the "Loading" text
            container.classList.add("scroll-container");

            totalPages = Math.ceil(words.length/WPP);


            loadingPage = 1;
            
            for(loadingPage = 1; loadingPage <= totalPages; loadingPage++) {
                const section = document.createElement('section');
                section.classList.add('page');

                
                pBegin = (loadingPage - 1)*WPP;
                pEnd = pBegin + WPC;

                for (loadingColumn = 1; loadingColumn <= columns; loadingColumn++) {
                    const column = document.createElement('div');
                    column.style.cssText = "display: flex; flex-direction: column; width: 30%;";
                    addToIdx = (loadingColumn-1)*WPC;

                    
                    words.slice(pBegin+addToIdx, pEnd+addToIdx).forEach(entry => {
                        
                        if (entry.Word) {
                            const div = document.createElement('div');
                            
                            pageHTML = `
                            <a>${entry.Word.adnotate()}</a> 
                            <a style="color: var(--col4)">${entry.Translation.adnotate()}</a>
                            `;
                            
                            div.innerHTML = pageHTML;
                            div.style.cssText = "display: flex; flex-direction: column; margin-bottom: 8px;";
                            column.appendChild(div);
                        }
                    });
                    section.appendChild(column);
                }
                
                container.appendChild(section);
            }
            console.log(words);
        }
        loadDictionary();


        String.prototype.adnotate = function() {
            return this.replaceAll("[", "<span class = 'adnot'>").replaceAll("]", "</span>");
        }
    </script>
</body>
</html>
