<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Etese</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --col1: #F6AE2D;
            --col2: #1D110A;
            --col3: #FCFFF7;
            --col4: #296EB4;
            --col5: #1789FC;

            --gray1: #e4e7eb;
            --gray2: #cbced1;
            

            --grad-blue: linear-gradient(var(--col5), var(--col4));
            --grad-gray: linear-gradient(var(--gray1), var(--gray2));

                
        }
        body {
            font-family: arial;
            font-size: 2em;
        }
        a {
            font-size: 2rem;
            
        }
        .adnot {
            font-style: italic;
            
        }
        .button {
            display: flex;
            border-radius: 10px;
            padding: 10px;
            background-image: linear-gradient(var(--col5), var(--col4));
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        input {
            font-size: 2rem;
            border-radius: 10px;
            padding: 10px;
        }
        input::placeholder {
          font-size: 2rem;
          /*opacity: 1;  Ensures consistent color across browsers */
        }
        
         /* The Container */
         .scroll-container {
             display: flex;
             overflow-x: auto;
             scroll-snap-type: x mandatory; /* Forces snapping on the X axis */
             scroll-behavior: smooth;
             width: 100vw;
             height: auto;
         }

         /* The Pages */
         .page {
             flex: 0 0 100%; /* Each page takes up 100% of the width */
             height: 100%;
             scroll-snap-align: start; /* Where the page should "stick" */
             display: flex;
             /*flex-direction: column;*/
             justify-content: space-between;
         }
        /* The container that handles the animation */
        .reveal-wrapper {
          display: grid;
          grid-template-rows: 0fr; /* Effectively hidden */
          transition: grid-template-rows 0.5s ease-out;
          overflow: hidden;
          background: #f4f4f4;
          border-radius: 8px;
        }
        
        /* This inner div is necessary for the browser to calculate height correctly */
        .reveal-content {
          min-height: 0; 
          padding: 0 20px; /* Horizontal padding is fine */
        }
        
        /* The "Open" State */
        .reveal-wrapper.is-open {
          grid-template-rows: 1fr; /* Expands to fit content */
          margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Dictionary</h1>
    <div style="display: flex; height: 80px; margin-bottom: 10px;">
        <input id="input-query" placeholder="Enter query here" style="width: 60%; margin-right: 5px;">
        <div class="button" onclick="displayPage()" style="width: 35%;">
            <a style="color: var(--col3)"> Search </a>
        </div>
    </div>
    <div onclick="showAdvanced()" >
        <a id="filters-text" class="button" style="background: var(--grad-gray)">Show filters</a>
    </div>

    <div class="reveal-wrapper" id="revealWrapper">
      <div class="reveal-content">
        <p>Surprise! This content slid down smoothly. You can put anything here—text, images, or even more buttons.</p>
      </div>
    </div>
    
    <div id="dictionary-container" style="margin-top: 15px;">Loading words...</div>

    <script>
        
        let words = []; // initialising as global array
        let currentPage = 1;
        const columns = 3;
        const WPC = 10;
        const WPP = WPC*columns;

        // --------------------------------------------------
        const wrapper = document.getElementById('revealWrapper');
        
        function showAdvanced() {
          wrapper.classList.toggle('is-open');
          
          // Optional: Change button text
          const isOpen = wrapper.classList.contains('is-open');
          document.getElementById("filters-text").textContent = isOpen ? 'Show filters' : 'Hide filters';
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const sheetId = urlParams.get('id');

        const defaultId = '2PACX-1vTfKG2OdSxQPoM5KZksk4JTlie4kaMiEvBDE7Tm8BvZsSk88mSQx748HK3W8-zvKXu3bJbFjST8_Lho';
        const finalId = sheetId || defaultId;
        
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${finalId}/pub?gid=0&single=true&output=csv`;

        
        async function loadDictionary() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();

                // PapaParse converts CSV text into a JSON-like array of objects
                Papa.parse(csvData, {
                    header: true, // Uses the first row as keys (e.g., "Word", "Definition")
                    complete: function(results) {
                        words = results.data.sort((a, b) => {
                            return a.Word.localeCompare(b.Word, undefined, { sensitivity: 'base' });
                        });
                        
                        displayPage();
                        
                        const input = document.getElementById("input-query");

                        // Add event listener for keydown
                        input.addEventListener("keydown", function(event) {
                            if (event.key === "Enter") {
                                displayPage();
                            }
                        });
                    }
                });
            } catch (error) {
                console.error("Error loading the sheet:", error);
            }
        }

        function displayPage() {
            const container = document.getElementById('dictionary-container');
            container.innerHTML = ''; // Clear the "Loading" text
            container.classList.add("scroll-container");

            searchResults = applyFilters(words);
            
            
            totalPages = Math.ceil(searchResults.length/WPP);


            loadingPage = 1;
            
            for(loadingPage = 1; loadingPage <= totalPages; loadingPage++) {
                const section = document.createElement('section');
                section.classList.add('page');

                
                pBegin = (loadingPage - 1)*WPP;
                pEnd = pBegin + WPC;

                for (loadingColumn = 1; loadingColumn <= columns; loadingColumn++) {
                    const column = document.createElement('div');
                    column.style.cssText = "display: flex; flex-direction: column; width: 30%;";
                    addToIdx = (loadingColumn-1)*WPC;

                    
                    searchResults.slice(pBegin+addToIdx, pEnd+addToIdx).forEach(entry => {
                        
                        if (entry.Word) {
                            const div = document.createElement('div');
                            
                            pageHTML = `
                            <a>${entry.Word.adnotate()}</a> 
                            <a style="color: var(--col4)">${entry.Translation.adnotate()}</a>
                            `;
                            
                            div.innerHTML = pageHTML;
                            div.style.cssText = "display: flex; flex-direction: column; margin-bottom: 8px;";
                            column.appendChild(div);
                        }
                    });
                    section.appendChild(column);
                }
                
                container.appendChild(section);
            }
            console.log(words);
        }
        loadDictionary();

        function applyFilters() {
            const query = document.getElementById("input-query").value;
            let results = words.filter((word) => word.Word.includes(query) || word.Translation.includes(query));
            return results;
        }

        

        String.prototype.adnotate = function() {
            return this.replaceAll("[", "<span class = 'adnot'>").replaceAll("]", "</span>");
        }
    </script>
</body>
</html>
